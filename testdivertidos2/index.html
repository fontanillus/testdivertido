<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Test Divertido</title>
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="mx-auto max-w-5xl bg-rose-50 px-4 py-6 text-gray-800 sm:py-10">

   <!-- Título -->
   <h1 class="text-3xl font-extrabold text-rose-900 sm:text-4xl">
      TEST DIVERTIDO
   </h1>

   <!-- PREGUNTA 1 -->
   <section class="mt-6">

      <p id="p1" class="mb-2 text-lg font-semibold leading-relaxed text-gray-700">
         1. Ordena estos animales en orden de preferencia:
      </p>

      <div class="space-y-3 pl-2 sm:pl-4">

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="vaca-value">Vaca:</label>
            <input id="vaca-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="number" min="1" max="5">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="tigre-value">Tigre:</label>
            <input id="tigre-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="number" min="1" max="5">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="oveja-value">Oveja:</label>
            <input id="oveja-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="number" min="1" max="5">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="caballo-value">Caballo:</label>
            <input id="caballo-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="number" min="1" max="5">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="mono-value">Mono:</label>
            <input id="mono-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="number" min="1" max="5">
         </div>

      </div>

   </section>

   <!-- PREGUNTA 2 -->
   <section class="mt-8">

      <p id="p2" class="mb-2 text-lg font-semibold leading-relaxed text-gray-700">
         2. Escribe una palabra que describa lo siguiente:
      </p>

      <div class="space-y-3 pl-2 sm:pl-4">

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="perro-value">Perro:</label>
            <input id="perro-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="gato-value">Gato:</label>
            <input id="gato-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="rata-value">Rata:</label>
            <input id="rata-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="cafe-value">Café:</label>
            <input id="cafe-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="mar-value">Mar:</label>
            <input id="mar-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

      </div>

   </section>

   <!-- PREGUNTA 3 -->
   <section class="mt-8">

      <p id="p3" class="mb-2 text-lg font-semibold leading-relaxed text-gray-700">
         3. Indica alguien importante para ti que te sugiera este color:
      </p>

      <div class="space-y-3 pl-2 sm:pl-4">

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="amarillo-value">Amarillo:</label>
            <input id="amarillo-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="naranja-value">Naranja:</label>
            <input id="naranja-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="blanco-value">Blanco:</label>
            <input id="blanco-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="rojo-value">Rojo:</label>
            <input id="rojo-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

         <div class="grid grid-cols-1 items-center gap-3 md:grid-cols-[250px_1fr]">
            <label for="verde-value">Verde:</label>
            <input id="verde-value" class="h-10 w-full rounded-md border border-gray-400 px-3 text-sm text-rose-900 outline-none transition focus:border-rose-700 focus:ring-2 focus:ring-rose-200" type="text">
         </div>

      </div>

   </section>

   <!-- Botón -->
   <div class="mt-8">
      <button id="btn-resultados"
         class="rounded-md border border-gray-400 bg-rose-900 px-5 py-2 font-semibold text-white transition hover:bg-rose-800">
         Ver resultados
      </button>
   </div>

   <!-- Resultados -->
   <div id="resultados" class="mt-8 space-y-2 pb-10"></div>

   <script>

      const animales = {
         vaca: "Tu carrera",
         tigre: "El orgullo",
         oveja: "El amor",
         caballo: "La familia",
         mono: "El dinero"
      };

      const palabras = {
         perro: "Tu personalidad",
         gato: "Tu pareja",
         rata: "Lo que más odias",
         cafe: "Para ti el sexo es",
         mar: "Y la vida..."
      };

      const colores = {
         amarillo: "Nunca te olvidará",
         naranja: "Puede ser tu gran amigo/a",
         blanco: "Tu alma gemela",
         rojo: "Realmente amas a...",
         verde: "Siempre estará en tu memoria"
      };

      const resultadoBox = document.getElementById("resultados");
      const botonResultados = document.getElementById("btn-resultados");

      botonResultados.addEventListener("click", calcular);

      function agregarTitulo(texto) {

         const h2 = document.createElement("h2");

         h2.className =
            "mt-5 text-xl font-bold text-rose-900";

         h2.textContent = texto;

         resultadoBox.appendChild(h2);
      }

      function agregarLinea(texto) {

         const p = document.createElement("p");

         p.className = "text-gray-700";

         p.textContent = texto;

         resultadoBox.appendChild(p);
      }

      function leerNumeroDeRanking(animal) {

         const input =
            document.getElementById(animal + "-value");

         const valor = input.value.trim();

         if (!valor) {
            throw new Error(
               "Completa todos los animales con valores del 1 al 5."
            );
         }

         const numero = Number(valor);

         if (
            !Number.isInteger(numero) ||
            numero < 1 ||
            numero > 5
         ) {
            throw new Error(
               "Cada animal debe tener un número entero entre 1 y 5."
            );
         }

         return numero;
      }

      function calcular() {

         resultadoBox.innerHTML = "";

         // PRIORIDADES

         let ranking = [];

         const usados = new Set();

         for (let animal in animales) {

            let valor;

            try {

               valor =
                  leerNumeroDeRanking(animal);

            } catch (error) {

               alert(error.message);

               return;
            }

            if (usados.has(valor)) {

               alert(
                  "No repitas números: usa cada valor del 1 al 5 una sola vez."
               );

               return;
            }

            usados.add(valor);

            ranking.push({
               nombre: animal,
               valor: valor
            });

         }

         ranking.sort(
            (a, b) => a.valor - b.valor
         );

         agregarTitulo("PRIORIDADES");

         ranking.forEach(item => {

            agregarLinea(
               animales[item.nombre]
            );

         });

         // PALABRAS

         agregarTitulo("COMO VES LA VIDA");

         for (let key in palabras) {

            let valor =
               document.getElementById(key + "-value")
                  .value
                  .trim();

            const texto =
               valor || "(sin respuesta)";

            agregarLinea(
               palabras[key] + ": " + texto
            );

         }

         // COLORES

         agregarTitulo("TU GENTE");

         for (let key in colores) {

            let valor =
               document.getElementById(key + "-value")
                  .value
                  .trim();

            const texto =
               valor || "(sin respuesta)";

            agregarLinea(
               colores[key] + ": " + texto
            );

         }

      }

   </script>

</body>

</html>
```
